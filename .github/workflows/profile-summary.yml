name: Profile Stats

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh stats cards
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PROFILE_USERNAME: ${{ github.repository_owner }}
        run: |
          node scripts/render-profile-stats.mjs
          for card in assets/stats/light/*.svg assets/stats/dark/*.svg; do
            grep -q "<svg" "$card"
          done

      - name: Commit refreshed stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats
          git diff --cached --quiet || git commit -m "Update profile stats cards"
          git push
