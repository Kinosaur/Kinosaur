name: Profile Summary Cards

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Refresh summary cards
        run: |
          mkdir -p assets/stats
          rm -f assets/stats/profile-details.svg
          curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/stats?username=${{ github.repository_owner }}&theme=vue" -o assets/stats/stats.svg
          curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/repos-per-language?username=${{ github.repository_owner }}&theme=vue" -o assets/stats/repos-per-language.svg
          curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/most-commit-language?username=${{ github.repository_owner }}&theme=vue" -o assets/stats/most-commit-language.svg
          curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/productive-time?username=${{ github.repository_owner }}&theme=vue&utcOffset=7" -o assets/stats/productive-time.svg
          for card in assets/stats/*.svg; do
            grep -q "<svg" "$card"
          done

      - name: Commit refreshed cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats/*.svg
          git diff --cached --quiet || git commit -m "Update profile summary cards"
          git push
